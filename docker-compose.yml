services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: shellton/nabad:latest
    restart: always
    environment:
      NODE_ENV: production
      # Provide your external connection string when running:
      #   DATABASE_URL=postgresql://user:pass@host:port/dbname?sslmode=require
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3126
    ports:
      - "3126:3126"
